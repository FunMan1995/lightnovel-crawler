name: Sync Web

on:
  workflow_call: {}
  workflow_dispatch: {}
  repository_dispatch:
    types: [web-build-updated]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch web build from lncrawl-web artifacts branch
        uses: actions/checkout@v6
        with:
          repository: lncrawl/lncrawl-web
          ref: artifacts
          path: lncrawl/server/web
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip dev-only files
        run: |
          rm -rf lncrawl/server/web/.git
          find lncrawl/server/web -name "*.map" -delete

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: dev
          commit_message: Update web build from lncrawl-web artifacts
