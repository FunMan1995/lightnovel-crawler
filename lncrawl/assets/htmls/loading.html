<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lightnovel Crawler</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #141414;
        color: #c9d1d9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #30363d;
        border-top-color: #7c5cbf;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        font-size: 14px;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <p>Starting Lightnovel Crawler&#x2026;</p>
  </body>
</html>
